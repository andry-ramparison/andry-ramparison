name: Génération des statistiques de profil

on:
  schedule:
    - cron: "0 0 * * *"    # tous les jours à minuit UTC
  workflow_dispatch:        # déclenchement manuel possible depuis l'onglet Actions
  push:
    branches:
      - main

jobs:
  generation-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: andry-ramparison
          filename: github-metrics.svg
          committer_message: "auto: mise à jour des statistiques de profil"

          # Thème sombre cohérent avec le README (fond 0D1117, accent E63946)
          config_display: large
          config_timezone: Indian/Antananarivo
          plugin_base: base
          base: header, activity, community, repositories, metadata

          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_limit: 8
          plugin_languages_threshold: 0%

          plugin_lines: yes

          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes

          # Palette : fond sombre, accent rouge
          config_theme: dark
          "config_colors": |
            0D1117
            E63946
            E63946